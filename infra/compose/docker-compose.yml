services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-assistant}
      POSTGRES_USER: ${POSTGRES_USER:-assistant}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_for_local_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    image: ai-api:local
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      LOG_DIR: /logs
      CHECKPOINT_DIR: /checkpoints
      REDIS_URL: redis://redis:6379/0
      AUTO_STAGE5_POSTRUN_ENABLED: "1"
      CHANGE_GATE_ENFORCED_TARGET_TYPES: model_route,model_provider,tool_registry,risk_policy
      WORKSPACE_ROOT: /workspace_repo
      PYTHONPATH: /workspace_repo:/workspace_repo/apps/api
    volumes:
      - ../../logs:/logs
      - ../../data/checkpoints:/checkpoints
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: ../..
      dockerfile: apps/worker/Dockerfile
    image: ai-worker:local
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      LOG_DIR: /logs
      ARTIFACT_DIR: /artifacts
      WORKSPACE_DIR: /workspace
      CHECKPOINT_DIR: /checkpoints
      REDIS_URL: redis://redis:6379/0
      WORKER_ID: worker-main
      AUTO_STAGE5_POSTRUN_ENABLED: "1"
      WORKSPACE_ROOT: /workspace_repo
      PYTHONPATH: /workspace_repo
    volumes:
      - ../../data/artifacts:/artifacts
      - ../../data/workspace:/workspace
      - ../../data/checkpoints:/checkpoints
      - ../../logs:/logs
    depends_on:
      - postgres
      - redis

  web:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ../../apps/web:/usr/share/nginx/html:ro
    ports:
      - "${WEB_PORT:-8080}:80"

  scheduler:
    build:
      context: ../..
      dockerfile: scripts/Dockerfile
    image: ai-scheduler:local
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      API_BASE: http://api:8000
      LOG_DIR: /logs
      DAILY_REVIEW_INTERVAL_SECONDS: 3600
      DAILY_REVIEW_STARTUP_DELAY_SECONDS: 15
      DAILY_REVIEW_KIND: daily
      DAILY_REVIEW_SESSION_LIMIT: 20
      DAILY_REVIEW_ACTIVE_WITHIN_HOURS: 24
      DAILY_REVIEW_FORCE: "0"
      DAILY_REVIEW_NOTE: ""
    volumes:
      - ../../logs:/logs
    depends_on:
      - api

volumes:
  postgres_data:
